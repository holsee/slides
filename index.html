<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slides — @holsee</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wght@400;500;600;700&display=swap');

:root {
  --bg: #020810;
  --bg-alt: #0a1628;
  --bg-card: #0c1a2e;
  --accent: #4fc3f7;
  --accent2: #29b6f6;
  --accent3: #81d4fa;
  --green: #4dd0e1;
  --amber: #80deea;
  --rose: #e0f7fa;
  --text: #b3e5fc;
  --muted: #4a6a7a;
  --dim: #1a3050;
  --glow: #4fc3f7;
  --glow-strong: 0 0 8px #4fc3f780, 0 0 20px #4fc3f730;
  --glow-text: 0 0 6px #4fc3f750;
  --border: #1e3a5f;
  --font-h: 'Noto Sans Mono', monospace;
  --font-b: 'Noto Sans Mono', monospace;
  --font-mono: 'Noto Sans Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-b);
  font-size: 14px;
  text-shadow: var(--glow-text);
}

/* ── CRT scanlines overlay ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0, 20, 40, 0.15) 2px,
    rgba(0, 20, 40, 0.15) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* ── CRT vignette ── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(
    ellipse at center,
    transparent 50%,
    rgba(0, 0, 0, 0.45) 100%
  );
  pointer-events: none;
  z-index: 9998;
}

/* ── Subtle ambient flicker ── */
@keyframes crt-flicker {
  0%, 100% { opacity: 1; }
  92% { opacity: 1; }
  93% { opacity: 0.97; }
  94% { opacity: 1; }
}

.page {
  max-width: 720px;
  margin: 0 auto;
  padding: 8vh 4vw;
  animation: crt-flicker 8s infinite;
}

/* ── Author handle ── */
.author-handle {
  position: fixed;
  top: 2vh; right: 3vw;
  font-size: 0.75rem;
  color: var(--muted);
  font-family: var(--font-mono);
  z-index: 100;
  text-decoration: none;
  transition: color 0.2s, text-shadow 0.2s;
}
.author-handle:hover {
  color: var(--accent);
  text-shadow: var(--glow-text);
}

.section-label {
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.2em;
  margin-bottom: 0.5rem;
}
.section-label::before { content: '// '; color: var(--dim); }

.page-title {
  font-family: var(--font-h);
  font-size: clamp(1.6rem, 3.2vw, 2.4rem);
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 0.5rem;
  color: var(--accent);
  text-shadow: 0 0 10px rgba(79,195,247,0.4), 0 0 30px rgba(79,195,247,0.15);
}

.page-subtitle {
  font-size: clamp(0.78rem, 1.1vw, 0.9rem);
  color: var(--text);
  line-height: 1.7;
  opacity: 0.6;
  margin-bottom: 3rem;
}

.divider {
  border: none;
  border-top: 1px solid var(--border);
  margin-bottom: 2rem;
}

/* ── Presentation list ── */
.talk-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.talk-item a {
  display: block;
  padding: 1.2rem 1.5rem;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 4px;
  text-decoration: none;
  transition: all 0.25s ease;
}

.talk-item a:hover {
  border-color: var(--accent);
  box-shadow: var(--glow-strong);
  transform: translateY(-1px);
}

.talk-title {
  font-family: var(--font-h);
  font-size: 1rem;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 0.3rem;
}

.talk-meta {
  font-size: 0.75rem;
  color: var(--muted);
}
</style>
</head>
<body>

<a class="author-handle" href="https://x.com/holsee" target="_blank" rel="noopener">@holsee</a>

<div class="page">
  <div class="section-label">Index</div>
  <div class="page-title">Slides</div>
  <div class="page-subtitle">Presentations by @holsee</div>
  <hr class="divider">
  <ul class="talk-list">
    <li class="talk-item">
      <a href="configuring-your-coding-agent/">
        <div class="talk-title">Configuring Your Coding Agent</div>
        <div class="talk-meta">April 2026 · Claude Code · OpenCode</div>
      </a>
    </li>
  </ul>
</div>

</body>
</html>
